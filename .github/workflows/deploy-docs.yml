name: Deploy Docs

on:
    push:
        branches: [main]
        paths:
            - "apps/docs/**"
    workflow_dispatch:

jobs:
    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        concurrency:
            group: apps/docs-${{ github.ref }}
            cancel-in-progress: false
        environment:
            name: ${{ github.ref == 'refs/heads/main' && 'docs.gitgazer.com' || null }}
            url: ${{ github.ref == 'refs/heads/main' && 'https://docs.gitgazer.com/' || null }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6
              with:
                  run_install: false

            - uses: actions/setup-node@v6
              with:
                  node-version-file: ./apps/docs/package.json
                  cache: "pnpm"
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build docs
              run: pnpm --filter @gitgazer/docs build

            - name: Configure AWS credentials
              if: github.ref == 'refs/heads/main'
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  role-session-name: gitgazer-docs-deploy
                  aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
                  mask-aws-account-id: true

            - name: Deploy to S3
              run: |
                  aws s3 sync apps/docs/build/ s3://${{ env.DOCS_S3_BUCKET }}/ \
                    --delete \
                    --cache-control "public, max-age=31536000, immutable" \
                    --exclude "*.html" \
                    --exclude "sitemap.xml" \
                    --exclude "robots.txt"

                  aws s3 sync apps/docs/build/ s3://${{ env.DOCS_S3_BUCKET }}/ \
                    --delete \
                    --cache-control "public, max-age=0, must-revalidate" \
                    --exclude "*" \
                    --include "*.html" \
                    --include "sitemap.xml" \
                    --include "robots.txt"

            - name: Invalidate CloudFront cache
              run: |
                  DISTRIBUTION_ID=$(aws cloudfront list-distributions \
                    --query "DistributionList.Items[?Aliases.Items[?contains(@, 'docs.gitgazer.com')]].Id | [0]" \
                    --output text)
                  aws cloudfront create-invalidation \
                    --distribution-id "$DISTRIBUTION_ID" \
                    --paths "/*"
